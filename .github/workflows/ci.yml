name: CI

on:
  push:
    branches: [main]
    paths: ["ptxiagram/**"]
  pull_request:
    paths: ["ptxiagram/**"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ptxiagram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
